<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor de Cliente - Profesional</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: #1a1a1a; padding: 15px; text-align: center; font-size: 1.8rem; border-bottom: 2px solid #29b6f6; color: #29b6f6; }
        
        /* Contenedor de productos en 3 columnas */
        #lista-productos { 
            flex: 1; 
            padding: 20px; 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            align-content: start;
        }
        .fila { 
            background: #111; 
            padding: 8px; 
            border: 1px solid #333; 
            border-radius: 5px; 
            font-size: 1rem;
        }
        .info-prod { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .precios-prod { display: flex; justify-content: space-between; font-size: 0.9rem; color: #aaa; }
        .precio-usd { color: #00e676; font-weight: bold; }
        .precio-bs { color: #29b6f6; }

        /* Cuadro de totales animado en esquina inferior derecha */
        .totales-floating { 
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            background: #1a1a1a; 
            padding: 15px 25px; 
            border: 2px solid #00e676; 
            border-radius: 15px; 
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.3);
            text-align: right;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        
        .monto-usd { font-size: 2.2rem; color: #00e676; font-weight: bold; margin: 0; }
        .monto-bs { font-size: 1.2rem; color: #29b6f6; }
    </style>
</head>
<body>

    <div class="header">DETALLE DE PRODUCTOS</div>
    
    <div id="lista-productos">
        <div style="grid-column: span 3; text-align: center; color: #555; margin-top: 50px;">Esperando productos...</div>
    </div>

    <div class="totales-floating">
        <div style="font-size: 0.8rem; color: #aaa;">TOTAL A PAGAR</div>
        <div class="monto-usd" id="visor-total-usd">$ 0.00</div>
        <div class="monto-bs" id="visor-total-bs">Bs 0.00</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // CONFIGURACIÓN DE TU SISTEMA
        const firebaseConfig = {
            apiKey: "AIzaSyCgFJVToluiG3I-Lxml6cXmP-f2pMb0rxg",
            authDomain: "sistema-store.firebaseapp.com",
            projectId: "sistema-store",
            storageBucket: "sistema-store.firebasestorage.app",
            messagingSenderId: "1083764921833",
            appId: "1:1083764921833:web:a9bc5dd175b55bead76778",
            measurementId: "G-L1M6PE57JF"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'visor_actual'), (snapshot) => {
            const data = snapshot.val();
            const contenedor = document.getElementById('lista-productos');
            
            if (data && data.carrito && data.carrito.length > 0) {
                // Obtenemos la tasa usada para calcular los bolívares por producto
                const tasa = parseFloat(data.tasaUsada) || 1;
                
                contenedor.innerHTML = data.carrito.map(item => `
                    <div class="fila">
                        <div class="info-prod">
                            <span>${item.cantidad} x ${item.nombre}</span>
                        </div>
                        <div class="precios-prod">
                            <span class="precio-usd">$${(item.cantidad * item.precio).toFixed(2)}</span>
                            <span class="precio-bs">Bs ${(item.cantidad * item.precio * tasa).toFixed(2)}</span>
                        </div>
                    </div>
                `).join('');
                
                document.getElementById('visor-total-usd').textContent = `$ ${data.totalUSD}`;
                document.getElementById('visor-total-bs').textContent = `Bs ${data.totalBs}`;
            } else {
                contenedor.innerHTML = '<div style="grid-column: span 3; text-align: center; color: #555; margin-top: 50px;">Esperando productos...</div>';
                document.getElementById('visor-total-usd').textContent = '$ 0.00';
                document.getElementById('visor-total-bs').textContent = 'Bs 0.00';
            }
        });
    </script>
</body>
</html>
